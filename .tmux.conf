# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display " Config reloaded!"

# General
set -g mouse on
set -g repeat-time 0
set -g renumber-windows on
bind -n S-Enter send-keys Escape "[13;2u"

# Session
bind s choose-tree -Zs -O name

# Window
bind t new-window -c "#{pane_current_path}"
bind w kill-window
unbind p
bind [ previous-window
bind ] next-window
unbind Space
unbind C-o
unbind {
unbind }

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind-key -n M-H resize-pane -L 3
bind-key -n M-L resize-pane -R 3
bind-key -n M-K resize-pane -U 3
bind-key -n M-J resize-pane -D 3

# Pane border
set -g pane-border-style "fg=#4c566a"
set -g pane-active-border-style "fg=#88c0d0"

# Popup
bind Enter display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "zsh"
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "zsh -ic lazygit"

# Copy mode
set -g mode-style "fg=#161821,bg=#89b8c2"
bind C-[ copy-mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi C-v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-[ send-keys -X cancel

# Terminal settings for transparency
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",ghostty:Tc"

# Transparent background
set -g window-style "bg=#6b7489,fg=#7d8799"
set -g window-active-style "bg=terminal,fg=terminal"

# --- Status bar ---
set -g status-position bottom
set -g status-interval 1
set -g status-justify left

# Nord-inspired colors
# bg: #2e3440, fg: #d8dee9, accent: #81a1c1, highlight: #88c0d0, muted: #4c566a
set -g status-style "bg=#2e3440,fg=#d8dee9"

# Left Status
set -g status-left-length 50
set -g status-left "#[bold]#{?client_prefix,#[bg=#a3be8c]#[fg=#2e3440] PREFIX #[bg=#81a1c1]#[fg=#a3be8c],#{?pane_in_mode,#[bg=#d08770]#[fg=#2e3440]  COPY  #[bg=#81a1c1]#[fg=#d08770],#[bg=#4e6e8e]#[fg=#d8dee9] NORMAL #[bg=#81a1c1]#[fg=#4e6e8e]}}\ue0b0#[bg=#81a1c1,fg=#2e3440] #S #[bg=#2e3440,fg=#81a1c1]\ue0b0"

# Right Status
set -g status-right "#[bg=#2e3440,fg=#81a1c1]\ue0b2#[bg=#81a1c1,fg=#2e3440,bold] %Y-%m-%d %H:%M "

# Window list
set -g window-status-format "#[fg=#d8dee9,bg=#4c566a] #I: #W "
set -g window-status-current-format "#[fg=#88c0d0,bg=#2e3440]\ue0b2#[fg=#2e3440,bg=#88c0d0,bold] #I: #W #[fg=#88c0d0,bg=#2e3440]\ue0b0"
set -g window-status-separator " "

# Message style
set -g message-style "bg=#ebcb8b,fg=#2e3440,bold"
